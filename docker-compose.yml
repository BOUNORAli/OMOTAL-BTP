services:
  postgres:
    image: postgres:16-alpine
    container_name: omotal-postgres
    environment:
      POSTGRES_DB: omotal
      POSTGRES_USER: omotal
      POSTGRES_PASSWORD: omotal
    ports:
      - "5432:5432"
    volumes:
      - omotal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omotal -d omotal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  omotal-postgres-data:
